<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>黄芪救太后 · 水墨动画</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script>window.p5 = { sketch: null, instance: null };</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #1a1510;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #canvas-container {
      position: relative;
      width: 1920px;
      height: 1080px;
    }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }
    #ui button {
      padding: 8px 16px;
      background: rgba(139,170,122,0.9);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: sans-serif;
      font-size: 13px;
    }
    #ui button:hover { background: rgba(139,170,122,1); }
    #status {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(168,201,154,0.7);
      font-size: 13px;

  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui">
    <button onclick="toggleAudio()">🎵 配乐</button>
    <button onclick="toggleNarration()">🎤 旁白</button>
    <button onclick="exportFrames()">📽️ 导出帧</button>
  </div>
  <div id="status">时长: 30秒 | 按 G 键导出 GIF | 按 S 键保存 PNG | 按 R 键重新开始</div>

<script>
// ============================================================
//  黄芪救太后 · 水墨动画  30秒
//  p5.js + Web Speech API + Web Audio API
// ============================================================

// --- 配置 ---
const W = 1920, H = 1080;
const FPS = 30;
const TOTAL_FRAMES = FPS * 30; // 30秒
const DURATION_MS = 30000;

// --- 时间轴（毫秒） ---
const TIMELINE = {
  // phase 0: 片头
  title_start: 0,
  title_end: 3000,
  // phase 1: 故事背景
  story1_start: 3000,
  story1_end: 10000,
  // phase 2: 治疗
  story2_start: 10000,
  story2_end: 19000,
  // phase 3: 原理
  story3_start: 19000,
  story3_end: 26000,
  // phase 4: 养生启示
  lesson_start: 26000,
  lesson_end: 28500,
  // phase 5: 出处
  source_start: 28500,
  source_end: 30000,
};

// 旁白文本
const NARRATIONS = [
  { start: 0,    end: 3000,  text: "黄芪救太后" },
  { start: 3000, end: 10000, text: "清代光绪年间，慈禧太后因政事操劳过度，又染痢疾，日泻十余次，御医遍用止泻之药无效，群医束手。" },
  { start: 10000,end: 19000, text: "名医马培之以大量黄芪一两，配以党参白术，煎汤进服。慈禧服后次日痢止，三日体力渐复。" },
  { start: 19000,end: 26000, text: "马培之解释道：太后久病伤气，气陷则泻不止。黄芪升阳举陷，补气固脱，乃治本之策。" },
  { start: 26000,end: 28500, text: "养生启示：黄芪为补气升阳第一要药，凡气虚下陷之久泻、脱肛、内脏下垂皆可配伍使用。" },
  { start: 28500,end: 30000, text: "出处：《清宫医案》·马培之医案" },
];

// --- 颜色调色板（水墨） ---
const INK = {
  bg:        [245, 240, 228],  // 宣纸色
  ink:       [28,  22,  18],   // 浓墨
  inkMid:    [65,  55,  48],   // 中墨
  inkLight:  [110, 98,  88],   // 淡墨
  inkFade:   [155, 140, 128],  // 极淡墨
  accent:    [120, 60,  40],   // 朱砂/印章红
  gold:      [160, 120, 60],   // 古金
  sage:      [90,  110, 75],   // 青绿
};

// --- 全局状态 ---
let audioCtx = null;
let audioStarted = false;
let narrationStarted = false;
let speechSynth = null;
let bgMusicNodes = [];

let inkParticles = [];
let brushStrokes = [];
let textReveals = [];
let inkDrops = [];

let bgGraphics = null;
let trailGraphics = null;

let currentPhase = -1;
let phaseProgress = 0;
let sceneTime = 0;
let seed = 42;

// ============================================================
//  辅助函数
// ============================================================
function getPhase(t) {
  if (t < TIMELINE.title_start)   return 0;
  if (t < TIMELINE.story1_start)  return 0;
  if (t < TIMELINE.story1_end)    return 1;
  if (t < TIMELINE.story2_end)    return 2;
  if (t < TIMELINE.story3_end)   return 3;
  if (t < TIMELINE.lesson_start)  return 3;
  if (t < TIMELINE.source_end)    return 4;
  return 5;
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }
function easeInQuad(t) { return t * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ============================================================
//  水墨粒子系统
// ============================================================
class InkParticle {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type || 'drift';
    this.vx = (Math.random() - 0.5) * 0.8;
    this.vy = (Math.random() - 0.5) * 0.8 - 0.3;
    this.life = 1.0;
    this.maxLife = 1.0;
    this.size = Math.random() * 18 + 6;
    this.angle = Math.random() * TWO_PI;
    this.spin = (Math.random() - 0.5) * 0.04;
    this.alpha = Math.random() * 0.15 + 0.03;
    this.colorVar = Math.random();
  }

  update() {
    let ns = 0.003;
    let nt = frameCount * 0.008;
    let nx = noise(this.x * ns, this.y * ns, nt) - 0.5;
    let ny = noise(this.x * ns + 100, this.y * ns + 100, nt + 0.5) - 0.5;
    this.vx += nx * 0.12;
    this.vy += ny * 0.12;
    this.vy += 0.02; // 轻微下落
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.spin;
    this.life -= 0.004;
  }

  draw(p, g) {
    if (this.life <= 0) return;
    let a = this.alpha * (this.life / this.maxLife);
    let c = lerpColor(
      color(INK.ink[0], INK.ink[1], INK.ink[2]),
      color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]),
      this.colorVar
    );
    c.setAlpha(a * 255);
    p.push();
    p.translate(this.x, this.y);
    p.rotate(this.angle);
    p.noStroke();
    p.fill(c);
    p.ellipse(0, 0, this.size, this.size * 0.6);
    p.pop();
  }

  isDead() { return this.life <= 0; }
}

// 毛笔笔画
class BrushStroke {
  constructor(x, y, angle, length, thickness) {
    this.points = [];
    let steps = Math.floor(length / 4);
    for (let i = 0; i < steps; i++) {
      let t = i / steps;
      let px = x + Math.cos(angle) * length * t + (Math.random()-0.5) * 6;
      let py = y + Math.sin(angle) * length * t + (Math.random()-0.5) * 6;
      this.points.push({x: px, y: py, t: t});
    }
    this.thickness = thickness;
    this.life = 1.0;
    this.alpha = 0.6;
    this.drawn = 0; // 0-1 绘制进度
  }

  update() {
    if (this.drawn < 1.0) this.drawn += 0.04;
    this.life -= 0.001;
    this.drawn = Math.min(1.0, this.drawn);
  }

  draw(p, g) {
    if (this.points.length < 2 || this.drawn <= 0) return;
    let drawnPts = Math.floor(this.points.length * this.drawn);
    if (drawnPts < 2) return;

    let c = color(INK.ink[0], INK.ink[1], INK.ink[2]);
    c.setAlpha(this.alpha * this.life * 255);
    p.stroke(c);
    p.strokeWeight(this.thickness);
    p.noFill();
    p.beginShape();
    for (let i = 0; i < drawnPts; i++) {
      let pt = this.points[i];
      // 笔触粗细变化：中间粗，两端细
      let w = this.thickness * Math.sin(pt.t * Math.PI) * 0.8 + this.thickness * 0.2;
      p.strokeWeight(w);
      p.vertex(pt.x, pt.y);
    }
    p.endShape();
  }

  isDead() { return this.life <= 0 && this.drawn >= 1.0; }
}

// 墨滴飞溅
class InkDrop {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5) * 6;
    this.vy = (Math.random()-0.5) * 6 - 2;
    this.life = 1.0;
    this.size = Math.random() * 12 + 4;
    this.splatters = [];
    for (let i = 0; i < Math.floor(Math.random()*6)+2; i++) {
      this.splatters.push({
        x: x, y: y,
        vx: (Math.random()-0.5)*8,
        vy: (Math.random()-0.5)*8,
        size: Math.random()*5+1,
        life: 1.0
      });
    }
  }

  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.15;
    this.vx *= 0.98;
    this.life -= 0.025;
    for (let s of this.splatters) {
      s.x += s.vx; s.y += s.vy;
      s.vy += 0.2; s.vx *= 0.97;
      s.life -= 0.03;
    }
  }

  draw(p) {
    if (this.life <= 0) return;
    let c = color(INK.ink[0], INK.ink[1], INK.ink[2]);
    c.setAlpha(this.life * 220);
    p.noStroke();
    p.fill(c);
    p.ellipse(this.x, this.y, this.size * this.life);
    for (let s of this.splatters) {
      if (s.life <= 0) continue;
      let sc = color(INK.ink[0], INK.ink[1], INK.ink[2]);
      sc.setAlpha(s.life * 180);
      p.fill(sc);
      p.ellipse(s.x, s.y, s.size * s.life);
    }
  }

  isDead() { return this.life <= 0 && this.splatters.every(s => s.life <= 0); }
}

// ============================================================
//  文字显现效果
// ============================================================
class TextReveal {
  constructor(text, x, y, size, color, align, duration) {
    this.text = text;
    this.x = x; this.y = y;
    this.size = size;
    this.color = color;
    this.align = align || CENTER;
    this.duration = duration || 2000;
    this.startTime = millis();
    this.progress = 0;
    this.done = false;
  }

  update() {
    let elapsed = millis() - this.startTime;
    this.progress = clamp(elapsed / this.duration, 0, 1);
    if (this.progress >= 1) this.done = true;
  }

  draw(p) {
    if (this.done) return;
    let t = easeOutCubic(this.progress);
    let alpha = t * 255;
    let c = color(this.color[0], this.color[1], this.color[2]);
    c.setAlpha(alpha);
    p.push();
    p.textAlign(this.align, CENTER);
    p.textSize(this.size * t);
    p.noStroke();
    p.fill(c);
    // 裁剪显现
    p.textFont('Ma Shan Zheng');
    p.text(this.text, this.x, this.y);
    p.pop();
  }
}

// ============================================================
//  水墨晕染背景
// ============================================================
function drawInkWashBg(p, g, t, phase) {
  p.push();
  p.drawingContext.filter = 'none';

  // 基础宣纸底
  p.background(INK.bg[0], INK.bg[1], INK.bg[2]);

  // 纸张纹理：fbm噪声
  g.push();
  g.loadPixels();
  let scale = 2;
  for (let x = 0; x < g.width; x += scale) {
    for (let y = 0; y < g.height; y += scale) {
      let n1 = p.noise(x * 0.003, y * 0.003, frameCount * 0.0003);
      let n2 = p.noise(x * 0.008 + 50, y * 0.008 + 50, frameCount * 0.0005);
      let brightness = (n1 * 0.6 + n2 * 0.4) * 18;
      let idx = (y * g.width + x) * 4;
      g.pixels[idx]   = clamp(g.pixels[idx]   - brightness * 0.5, 0, 255);
      g.pixels[idx+1] = clamp(g.pixels[idx+1] - brightness * 0.4, 0, 255);
      g.pixels[idx+2] = clamp(g.pixels[idx+2] - brightness * 0.3, 0, 255);
      g.pixels[idx+3] = 255;
    }
  }
  g.updatePixels();
  g.pop();

  // 随时间流动的墨迹晕染
  if (phase >= 1) {
    let inkAlpha = clamp((phase - 1) * 0.3, 0, 0.12);
    g.push();
    g.noStroke();
    for (let i = 0; i < 3; i++) {
      let cx = W * 0.3 + Math.sin(t * 0.0003 + i) * W * 0.2;
      let cy = H * 0.4 + Math.cos(t * 0.0002 + i * 2) * H * 0.15;
      let c = color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]);
      c.setAlpha(inkAlpha * 255);
      g.fill(c);
      g.ellipse(cx, cy, 300 + Math.sin(t*0.001)*50, 400 + Math.cos(t*0.001)*60);
    }
    g.pop();
  }

  p.image(g, 0, 0);
  p.pop();
}

// ============================================================
//  片头标题
// ============================================================
function drawTitlePhase(p, progress) {
  let t = easeOutCubic(progress);

  // 墨迹晕染扩散动画
  p.push();
  p.noStroke();
  // 中心墨团
  let maxR = 600 * t;
  for (let r = maxR; r > 0; r -= 30) {
    let a = (1 - r/maxR) * 0.08 * t;
    let c = color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]);
    c.setAlpha(a * 255);
    p.fill(c);
    p.ellipse(W/2, H/2 - 40, r, r * 0.7);
  }

  // 标题：黄芪
  let titleAlpha = clamp((t - 0.3) / 0.7, 0, 1) * 255;
  let titleSize = lerp(40, 120, easeOutExpo(clamp((t-0.3)/0.7, 0, 1)));
  let tc = color(INK.ink[0], INK.ink[1], INK.ink[2]);
  tc.setAlpha(titleAlpha);
  p.fill(tc);
  p.noStroke();
  p.textAlign(CENTER, CENTER);
  p.textFont('Ma Shan Zheng');
  p.textSize(titleSize);
  p.text("黄 芪", W/2, H/2 - 60);

  // 副标题
  let subAlpha = clamp((t - 0.5) / 0.5, 0, 1) * 200;
  let sc = color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]);
  sc.setAlpha(subAlpha);
  p.fill(sc);
  p.textSize(lerp(20, 48, easeOutExpo(clamp((t-0.5)/0.5, 0, 1))));
  p.text("黄芪救太后", W/2, H/2 + 40);

  // 装饰线
  let lineAlpha = clamp((t - 0.6) / 0.4, 0, 1) * 150;
  let lc = color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]);
  lc.setAlpha(lineAlpha);
  p.stroke(lc);
  p.strokeWeight(1.5);
  p.line(W/2 - 200, H/2 + 80, W/2 + 200, H/2 + 80);

  // 朱砂印章
  if (t > 0.7) {
    let sealAlpha = clamp((t - 0.7) / 0.3, 0, 1) * 220;
    let sec = color(INK.accent[0], INK.accent[1], INK.accent[2]);
    sec.setAlpha(sealAlpha);
    p.noStroke();
    p.fill(sec);
    p.rect(W/2 + 180, H/2 + 50, 60, 60, 4);
    p.fill(245, 240, 228, sealAlpha);
    p.textSize(20);
    p.textFont('Ma Shan Zheng');
    p.text("药", W/2 + 210, H/2 + 90);
  }
  p.pop();

  // 添加墨滴
  if (Math.random() < 0.08) {
    inkDrops.push(new InkDrop(W/2 + (Math.random()-0.5)*400, H/2 + (Math.random()-0.5)*200));
  }
}

// ============================================================
//  故事段落
// ============================================================
function drawStoryPhase(p, phase, progress) {
  let t = easeOutCubic(progress);

  // 背景淡墨山峦
  p.push();
  p.noStroke();
  // 远景山
  let mountainAlpha = 0.06 + 0.04 * Math.sin(frameCount * 0.01);
  let mc = color(INK.inkFade[0], INK.inkFade[1], INK.inkFade[2]);
  mc.setAlpha(mountainAlpha * 255);
  p.fill(mc);
  p.beginShape();
  p.vertex(0, H);
  let pts = [[0, H*0.65],[W*0.15, H*0.45],[W*0.3, H*0.55],[W*0.45, H*0.35],[W*0.6, H*0.5],[W*0.75, H*0.4],[W*0.9, H*0.52],[W, H*0.6],[W, H]];
  for (let [px, py] of pts) {
    // 添加呼吸动画
    let offset = Math.sin(frameCount * 0.008 + px * 0.001) * 8;
    p.vertex(px, py + offset);
  }
  p.endShape(p.CLOSE);

  // 中景山
  let mc2 = color(INK.inkLight[0], INK.inkLight[1], INK.inkLight[2]);
  mc2.setAlpha(0.04 * 255);
  p.fill(mc2);
  p.beginShape();
  p.vertex(0, H);
  let pts2 = [[0, H*0.72],[W*0.2, H*0.58],[W*0.4, H*0.68],[W*0.6, H*0.52],[W*0.8, H*0.62],[W, H*0.7],[W, H]];
  for (let [px, py] of pts2) {
    let offset = Math.sin(frameCount * 0.01 + px * 0.002) * 5;
    p.vertex(px, py + offset);
  }
  p.endShape(p.CLOSE);
  p.pop();

  // 随机毛笔笔画
  if (Math.random() < 0.06) {
    let x = Math.random() * W;
    let y = Math.random() * H * 0.6 + H * 0.2;
    let angle = Math.random() * Math.PI - Math.PI/2;
    let len = Math.random() * 80 + 40;
    brushStrokes.push(new BrushStroke(x, y, angle, len, Math.random()*3+2));
  }

  // 文字卡片背景（淡墨框）
  if (phase === 1 || phase === 2) {
    let cardAlpha = 0.05 + 0.02 * t;
    let cc = color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]);
    cc.setAlpha(cardAlpha * 255);
    p.noStroke();
    p.fill(cc);
    p.rect(W*0.08, H*0.58, W*0.84, H*0.35, 8);
  }

  // 添加墨滴
  if (Math.random() < 0.04) {
    inkDrops.push(new InkDrop(Math.random() * W, Math.random() * H * 0.5));
  }
}

// ============================================================
//  文字显示
// ============================================================
function drawTextContent(p, phase, progress) {
  let t = easeOutCubic(progress);

  if (phase === 1) {
    // 故事背景文字
    let textAlpha = clamp((t - 0.2) / 0.8, 0, 1);
    let tc = color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]);
    tc.setAlpha(textAlpha * 230);

    p.push();
    p.fill(tc);
    p.noStroke();
    p.textAlign(LEFT, TOP);
    p.textFont('Noto Serif SC');
    p.textSize(34);
    p.textLeading(56);

    let lines = [
      "清代光绪年间，慈禧太后因政事操劳过度，",
      "又染痢疾，日泻十余次，御医束手无策。"
    ];

    let baseX = W * 0.1;
    let baseY = H * 0.6;
    let revealedChars = Math.floor(lines.join('').length * t);

    let charCount = 0;
    for (let li = 0; li < lines.length; li++) {
      let lineY = baseY + li * 56;
      for (let ci = 0; ci < lines[li].length; ci++) {
        if (charCount < revealedChars) {
          p.text(lines[li][ci], baseX + ci * 22, lineY);
        }
        charCount++;
      }
    }
    p.pop();

    // 右下角装饰：慈禧（淡化）
    if (t > 0.5) {
      let empressAlpha = clamp((t - 0.5) / 0.5, 0, 1) * 40;
      let ec = color(INK.inkLight[0], INK.inkLight[1], INK.inkLight[2]);
      ec.setAlpha(empressAlpha);
      p.push();
      p.fill(ec);
      p.noStroke();
      p.textFont('Ma Shan Zheng');
      p.textSize(280);
      p.textAlign(RIGHT, BOTTOM);
      p.text("后", W * 0.92, H * 0.9);
      p.pop();
    }

  } else if (phase === 2) {
    // 治疗段落
    let textAlpha = clamp((t - 0.2) / 0.8, 0, 1);
    let tc = color(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2]);
    tc.setAlpha(textAlpha * 230);

    p.push();
    p.fill(tc);
    p.noStroke();
    p.textAlign(LEFT, TOP);
    p.textFont('Noto Serif SC');
    p.textSize(34);
    p.textLeading(56);

    let lines = [
      "名医马培之以大量黄芪一两，配以党参白术，",
      "煎汤进服。慈禧服后次日痢止，",
      "三日体力渐复。"
    ];

    let baseX = W * 0.1;
    let baseY = H * 0.6;
    let allText = lines.join('');
    let revealedChars = Math.floor(allText.length * t);

    let charCount = 0;
    for (let li = 0; li < lines.length; li++) {
      let lineY = baseY + li * 56;
      for (let ci = 0; ci < lines[li].length; ci++) {
        if (charCount < revealedChars) {
          p.text(lines[li][ci], baseX + ci * 22, lineY);
        }
        charCount++;
      }
    }

    // 右下角：印章装饰
    if (t > 0.6) {
      let sealA = clamp((t - 0.6) / 0.4, 0, 1) * 200;
      let sec = color(INK.accent[0], INK.accent[1], INK.accent[2]);
      sec.setAlpha(sealA);
      p.noStroke();
      p.fill(sec);
      p.rect(W * 0.82, H * 0.78, 80, 80, 4);
      p.fill(245, 240, 228, sealA);
      p.textSize(28);
      p.textFont('Ma Shan Zheng');
      p.textAlign(CENTER, CENTER);
      p.text("芪", W * 0.82 + 40, H * 0.78 + 40);
    }
    p.pop();

  } else if (phase === 3) {
    // 医理解释
    let textAlpha = clamp((t - 0.2) / 0.8, 0, 1);
    let tc = color(INK.ink[0], INK.ink[1], INK.ink[2]);
    tc.setAlpha(textAlpha * 240);

    p.push();
    p.fill(tc);
    p.noStroke();
    p.textAlign(CENTER, CENTER);
    p.textFont('Noto Serif SC');
    p.textSize(36);
    p.textLeading(60);

    let fullText = "马培之解释道：太后久病伤气，气陷则泻不止。\n黄芪升阳举陷，补气固脱，乃治本之策。";
    let allChars = fullText.replace('\n', '');
    let revealedChars = Math.floor(allChars.length * t);

    // 居中布局
    let line1 = fullText.split('\n')[0];
    let line2 = fullText.split('\n')[1];
    let totalW = (line1.length > line2.length ? line1.length : line2.length) * 36;
    let startX = W/2 - totalW/2;

    let charCount = 0;
    let y1 = H/2 - 40;
    let y2 = H/2 + 30;
    for (let ci = 0; ci < line1.length; ci++) {
      if (charCount < revealedChars) {
        p.text(line1[ci], startX + ci * 36, y1);
      }
      charCount++;
    }
    for (let ci = 0; ci < line2.length; ci++) {
      if (charCount < revealedChars) {
        p.text(line2[ci], startX + ci * 36, y2);
      }
      charCount++;
    }
    p.pop();

    // 装饰引号
    if (t > 0.3) {
      let qa = clamp((t - 0.3)/0.7, 0, 1) * 80;
      let qc = color(INK.inkLight[0], INK.inkLight[1], INK.inkLight[2]);
      qc.setAlpha(qa);
      p.push();
      p.fill(qc);
      p.noStroke();
      p.textFont('Ma Shan Zheng');
      p.textSize(120);
      p.textAlign(CENTER, CENTER);
      p.text("引", W * 0.12, H * 0.45);
      p.text("释", W * 0.88, H * 0.55);
      p.pop();
    }

  } else if (phase === 4) {
    // 养生启示
    let textAlpha = clamp((t - 0.2) / 0.8, 0, 1);
    let tc = color(INK.sage[0], INK.sage[1], INK.sage[2]);
    tc.setAlpha(textAlpha * 240);

    p.push();
    p.fill(tc);
    p.noStroke();
    p.textAlign(CENTER, CENTER);
    p.textFont('Noto Serif SC');
    p.textSize(38);
    p.textLeading(64);

    let fullText = "养生启示\n黄芪为补气升阳第一要药\n凡气虚下陷之久泻、脱肛皆可配伍使用";
    let lines = fullText.split('\n');
    let allChars = fullText.replace('\n', '');
    let revealedChars = Math.floor(allChars.length * t);

    let charCount = 0;
    for (let li = 0; li < lines.length; li++) {
      let y = H/2 - 60 + li * 64;
      for (let ci = 0; ci < lines[li].length; ci++) {
        if (charCount < revealedChars) {
          p.text(lines[li][ci], W/2 - (lines[li].length * 38)/2 + ci * 38, y);
        }
        charCount++;
      }
    }
    p.pop();

    // 装饰草药名
    if (t > 0.5) {
      let ha = clamp((t - 0.5)/0.5, 0, 1) * 60;
      let hc = color(INK.sage[0], INK.sage[1], INK.sage[2]);
      hc.setAlpha(ha);
      p.push();
      p.fill(hc);
      p.noStroke();
      p.textFont('Ma Shan Zheng');
      p.textSize(160);
      p.textAlign(CENTER, CENTER);
      p.text("药", W * 0.85, H * 0.25);
      p.pop();
    }

  } else if (phase === 5) {
    // 出处
    let textAlpha = clamp((t - 0.2) / 0.8, 0, 1);
    let tc = color(INK.inkLight[0], INK.inkLight[1], INK.inkLight[2]);
    tc.setAlpha(textAlpha * 200);

    p.push();
    p.fill(tc);
    p.noStroke();
    p.textAlign(CENTER, CENTER);
    p.textFont('Noto Serif SC');
    p.textSize(32);
    p.text("《清宫医案》· 马培之医案", W/2, H/2);
    p.pop();
  }
}

// ============================================================
//  音频系统
// ============================================================
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // 古风五声音阶氛围音
  // 宫商角徵羽 (C D E G A)
  const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
  const droneFreqs = [130.81, 196.00, 261.63]; // 低音 drone

  // 创建背景 drones
  for (let freq of droneFreqs) {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    let filter = audioCtx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.value = freq;
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.Q.value = 1;

    gain.gain.value = 0;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    bgMusicNodes.push({ osc, gain, filter, targetGain: 0.04 });
  }

  // 添加泛音
  let harmonic = audioCtx.createOscillator();
  let hGain = audioCtx.createGain();
  harmonic.type = 'triangle';
  harmonic.frequency.value = 523.25;
  hGain.gain.value = 0;
  harmonic.connect(hGain);
  hGain.connect(audioCtx.destination);
  harmonic.start();
  bgMusicNodes.push({ osc: harmonic, gain: hGain, targetGain: 0.015 });

  // 淡入
  fadeInBgMusic();
}

function fadeInBgMusic() {
  if (!audioCtx) return;
  let now = audioCtx.currentTime;
  for (let node of bgMusicNodes) {
    node.gain.gain.setValueAtTime(0, now);
    node.gain.gain.linearRampToValueAtTime(node.targetGain, now + 3);
  }
}

function fadeOutBgMusic(duration = 2) {
  if (!audioCtx) return;
  let now = audioCtx.currentTime;
  for (let node of bgMusicNodes) {
    node.gain.gain.setValueAtTime(node.gain.gain.value, now);
    node.gain.gain.linearRampToValueAtTime(0, now + duration);
  }
}

function toggleAudio() {
  if (!audioCtx) { initAudio(); return; }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
    fadeInBgMusic();
  } else {
    audioCtx.suspend();
  }
}

// ============================================================
//  语音旁白
// ============================================================
function startNarration() {
  if (narrationStarted || !window.speechSynthesis) return;
  narrationStarted = true;
  speechSynth = window.speechSynthesis;

  function speak(text, startMs, endMs) {
    let delay = startMs - millis();
    if (delay < 0) delay = 0;
    setTimeout(() => {
      if (!speechSynth) return;
      let utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = 1.1;
      utter.pitch = 0.95;
      // 尝试选择中文语音
      let voices = speechSynth.getVoices();
      let zhVoice = voices.find(v => v.lang.includes('zh'));
      if (zhVoice) utter.voice = zhVoice;
      speechSynth.speak(utter);
    }, delay);
  }

  for (let nar of NARRATIONS) {
    speak(nar.text, nar.start, nar.end);
  }
}

function toggleNarration() {
  if (!window.speechSynthesis) {
    alert('浏览器不支持语音合成');
    return;
  }
  if (!narrationStarted) {
    startNarration();
  } else {
    window.speechSynthesis.cancel();
    narrationStarted = false;
  }
}

// ============================================================
//  帧导出
// ============================================================
let frameBuffer = [];
let exporting = false;
let exportStartTime = 0;

function exportFrames() {
  if (exporting) return;
  exporting = true;
  exportStartTime = millis();
  frameBuffer = [];
  console.log('开始导出帧...');
  // 使用p5.js的saveFrames会在每一帧调用keyPressed里触发
  // 这里我们导出所有900帧
  let frames = FPS * 30; // 30秒
  p5_sketch.saveFrames('huangqi', 'png', frames, FPS, (buff) => {
    console.log('帧导出完成，共', buff.length, '帧');
    // 通知完成
    document.getElementById('status').textContent = '帧导出完成！准备合成视频...';
    exporting = false;
  });
}

// ============================================================
//  P5 主程序
// ============================================================
let p5_sketch;

const sketch_fn = (p) => {
  p5_sketch = p;

  // Headless 模式检测
  const IS_HEADLESS = /headless/i.test(navigator.userAgent);

  // 修复 p5.js 实例模式下 millis 访问
  p.setup = function() {
    let cnv = p.createCanvas(W, H);
    cnv.parent('canvas-container');
    p.frameRate(FPS);
    p.pixelDensity(1);
    p.colorMode(p.RGB, 255, 255, 255, 255);

    // 创建离屏缓冲
    bgGraphics = p.createGraphics(W, H);
    trailGraphics = p.createGraphics(W, H);

    // 初始化噪声种子
    p.noiseSeed(seed);
    p.randomSeed(seed);

    if (IS_HEADLESS) {
      // Headless 模式：noLoop 由外部控制帧导出
      p.noLoop();
      window._p5Ready = true;
      window._p5Instance = p;
      // 暴露 millis 到 window 以便 evaluate 调用
      window.getMillis = () => p.millis();
      console.log('Headless mode: noLoop enabled, awaiting redraw() calls');
    }

    console.log('水墨动画已就绪。按钮：🎵配乐 🎤旁白 📽️导出帧');
    document.getElementById('status').textContent = '水墨动画已就绪 | 🎵 配乐 | 🎤 旁白 | 📽️ 导出帧 | 时长: 30秒';
  };

  p.draw = function() {
    let t = millis();
    let progress = clamp(t / DURATION_MS, 0, 1);
    let frame = Math.floor(progress * TOTAL_FRAMES);
    let phase = getPhase(t);
    let phaseStart, phaseEnd;
    switch(phase) {
      case 0: phaseStart = TIMELINE.title_start; phaseEnd = TIMELINE.title_end; break;
      case 1: phaseStart = TIMELINE.story1_start; phaseEnd = TIMELINE.story1_end; break;
      case 2: phaseStart = TIMELINE.story2_start; phaseEnd = TIMELINE.story2_end; break;
      case 3: phaseStart = TIMELINE.story3_start; phaseEnd = TIMELINE.story3_end; break;
      case 4: phaseStart = TIMELINE.lesson_start; phaseEnd = TIMELINE.lesson_end; break;
      default: phaseStart = TIMELINE.source_start; phaseEnd = TIMELINE.source_end;
    }
    let phaseProgress = clamp((t - phaseStart) / (phaseEnd - phaseStart), 0, 1);

    // --- 背景层：宣纸 + 墨染 ---
    drawInkWashBg(p, bgGraphics, t, phase);

    // --- 积累层：墨迹轨迹 ---
    trailGraphics.push();
    trailGraphics.clear();
    // 绘制笔触（持续累积）
    for (let bs of brushStrokes) {
      bs.update();
      bs.draw(p, trailGraphics);
    }
    // 绘制墨滴
    for (let drop of inkDrops) {
      drop.update();
      drop.draw(p);
    }
    trailGraphics.pop();
    p.image(trailGraphics, 0, 0);

    // --- 粒子层 ---
    p.push();
    p.blendMode(p.BLEND);
    for (let pt of inkParticles) {
      pt.update();
      pt.draw(p, bgGraphics);
    }
    inkParticles = inkParticles.filter(pt => !pt.isDead());
    p.pop();

    // --- 阶段内容 ---
    if (phase === 0) {
      drawTitlePhase(p, phaseProgress);
    } else {
      drawStoryPhase(p, phase, phaseProgress);
      drawTextContent(p, phase, phaseProgress);
    }

    // 移除死亡元素
    brushStrokes = brushStrokes.filter(bs => !bs.isDead());
    inkDrops = inkDrops.filter(d => !d.isDead());

    // --- 进度指示 ---
    // 右上角时间
    let sec = Math.floor(t / 1000);
    let tc = color(INK.inkLight[0], INK.inkLight[1], INK.inkLight[2]);
    tc.setAlpha(80);
    p.push();
    p.fill(tc);
    p.noStroke();
    p.textFont('monospace');
    p.textSize(14);
    p.textAlign(RIGHT, TOP);
    p.text(`${sec}s / 30s`, W - 20, 20);
    // 进度条
    p.stroke(INK.inkLight[0], INK.inkLight[1], INK.inkLight[2], 60);
    p.strokeWeight(2);
    p.line(W - 200, 44, W - 20, 44);
    p.stroke(INK.inkMid[0], INK.inkMid[1], INK.inkMid[2], 150);
    p.strokeWeight(2);
    p.line(W - 200, 44, W - 200 + 180 * progress, 44);
    p.pop();

    // --- 片尾淡出 ---
    if (progress > 0.92) {
      let fade = (progress - 0.92) / 0.08;
      let fc = color(INK.bg[0], INK.bg[1], INK.bg[2]);
      fc.setAlpha(fade * 255);
      p.fill(fc);
      p.noStroke();
      p.rect(0, 0, W, H);
    }
  };

  // 键盘控制
  p.keyPressed = function() {
    if (p.key === 's' || p.key === 'S') {
      p.saveCanvas('huangqi_frame_' + Math.floor(millis()/1000), 'png');
    }
    if (p.key === 'g' || p.key === 'G') {
      p.saveGif('huangqi_anim', 30); // 30秒GIF
    }
    if (p.key === 'r' || p.key === 'R') {
      // 重新开始
      p.redraw();
      inkParticles = [];
      brushStrokes = [];
      inkDrops = [];
    }
  };
};

// 启动
new p5(sketch_fn, 'canvas-container');

// 语音合成 voice 加载

}
